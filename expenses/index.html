<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses Dashboard</title>
  <link rel="stylesheet" href="/expenses/styles.css?v=20260308-4" />
</head>
<body>
  <header class="topbar">
    <h1>Expenses Dashboard</h1>
    <p>SQLite-backed • mobile-first</p>
  </header>

  <main class="wrap">
    <section class="panel">
      <h2>Category Split</h2>
      <div class="pie-wrap">
        <div id="catPie" class="pie"></div>
        <div id="catLegend" class="legend"></div>
      </div>
    </section>

    <section class="panel">
      <h2>Category Spend Over Time</h2>
      <div class="line-wrap">
        <svg id="lineChart" viewBox="0 0 900 320" preserveAspectRatio="none"></svg>
        <div id="lineLegend" class="legend"></div>
      </div>
    </section>

    <section class="cards" id="kpis"></section>

    <section class="panel">
      <h2>Import PDF Statement</h2>
      <form id="uploadForm">
        <input type="text" id="accountName" placeholder="Account name (e.g. BPI Visa)" required />
        <input type="file" id="pdfFile" accept="application/pdf" required />
        <button type="submit">Upload & Parse</button>
      </form>
      <div id="importResult" class="muted"></div>
    </section>

    <section class="panel">
      <h2>Display & FX</h2>
      <div class="row">
        <select id="viewMode">
          <option value="home">PHP normalized</option>
          <option value="native">Native currency</option>
          <option value="both">Both</option>
        </select>
      </div>
      <form id="fxForm">
        <input type="number" step="0.0001" id="usdPhpRate" placeholder="USD→PHP rate (e.g. 58.2)" required />
        <button type="submit">Update USD/PHP</button>
      </form>
      <button id="fxBackfillBtn" type="button">Auto backfill historical USD→PHP</button>
    </section>

    <section class="panel">
      <h2>Recent Transactions</h2>
      <div id="monthTabs" class="tabs"></div>
      <div id="txList"></div>
    </section>
  </main>

  <script src="/expenses/app.js?v=20260308-4"></script>
</body>
</html>
