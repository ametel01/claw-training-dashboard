<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym531 Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="kicker">GYM531 TRACKER</p>
        <h1>Training Dashboard</h1>
      </div>
      <div class="top-actions">
        <button id="refreshBtn" class="btn-primary" type="button">Refresh from DB</button>
        <button id="todayBtn" class="btn-primary" type="button">Today</button>
        <span id="weeklyCompletion" class="weekly-pill">Week: --</span>
        <p id="generatedAt" class="muted"></p>
      </div>
    </header>

    <section id="totals" class="card-grid"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Estimated 1RM (last 12 weeks)</h2>
        <span class="muted">Wendler/Epley from best main top set</span>
      </div>
      <div id="est1rmRows" class="est1rm-grid"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Week Progress</h2>
        <span class="muted">Barbell · Cardio · Rings</span>
      </div>
      <div id="weekRows" class="week-rows"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Daily Activity Tiles</h2>
        <span class="muted">Last 14 days</span>
      </div>
      <div id="dailyTiles" class="tiles"></div>
    </section>
  </main>

  <div id="statusPicker" class="status-picker" hidden>
    <button type="button" data-status="green">🟢 Green</button>
    <button type="button" data-status="yellow">🟡 Yellow</button>
    <button type="button" data-status="red">🔴 Red</button>
  </div>

  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-head">
        <h3 id="detailTitle">Training details</h3>
        <button id="detailClose" class="modal-close" type="button">×</button>
      </div>
      <div id="detailBody" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js?v=readiness-toggle-4" defer></script>
</body>
</html>
